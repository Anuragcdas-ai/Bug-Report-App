<!DOCTYPE html>
<html>
<head>
    <title>Bug Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: white;
            letter-spacing: 0.5px;
        }

        .profile-dropdown .dropdown-toggle::after {
            display: none;
        }

        .profile-dropdown .dropdown-menu {
            min-width: 220px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            border-radius: 10px;
            padding: 8px;
            margin-top: 8px !important;
        }

        .profile-dropdown .dropdown-header {
            padding: 8px 12px 4px;
            font-size: 12px;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .profile-dropdown .dropdown-item {
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            transition: background 0.15s;
        }

        .profile-dropdown .dropdown-item:hover {
            background-color: #f0f0ff;
            color: #6366f1;
        }

        .profile-dropdown .dropdown-item i {
            width: 18px;
            margin-right: 8px;
            opacity: 0.7;
        }

        .profile-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 4px 12px 4px 4px;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        .profile-btn:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .profile-btn .username {
            font-size: 13px;
            font-weight: 500;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>
   <nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'bug-list' %}">
            🐞 Bug Tracker
        </a>

        <div class="d-flex gap-2 align-items-center">

            <!-- ALL BUGS ICON -->
            <a href="{% url 'all-bugs' %}" class="btn btn-warning btn-sm">
                <i class="bi bi-bug-fill"></i> All Bugs
            </a>

            <!-- USER PROFILE DROPDOWN -->
            <div class="dropdown profile-dropdown">
                <button class="profile-btn dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                    <div class="profile-avatar">
                        <!-- Shows first 2 letters of username, e.g. "JD" for John Doe -->
                        {{ user.username|slice:":2"|upper }}
                    </div>
                    <span class="username">{{ user.username }}</span>
                </button>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <div class="dropdown-header">
                            <div class="fw-semibold text-dark" style="font-size:14px;">{{ user.get_full_name|default:user.username }}</div>
                            <div style="font-size:12px; color:#888; text-transform:none; letter-spacing:0;">{{ user.email }}</div>
                        </div>
                    </li>
                    <li><hr class="dropdown-divider my-1"></li>

                    <!-- base.html — update the profile link -->
<a class="dropdown-item" href="{% url 'profile' request.user.username %}">
    <i class="bi bi-person-circle"></i> My Profile
</a>

<li>
    <a class="dropdown-item" href="{% url 'change_password' %}">
        <i class="bi bi-key"></i> Change Password
    </a>
</li>
<li><hr class="dropdown-divider my-1"></li>
                    
                    <li><hr class="dropdown-divider my-1"></li>

                    <!-- Logout -->
                    <li>
                        <form method="POST" action="{% url 'logout' %}"
                              onsubmit="return confirm('Are you sure you want to logout?');">
                            {% csrf_token %}
                            <button type="submit" class="dropdown-item text-danger">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
