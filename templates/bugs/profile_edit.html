{% extends 'base.html' %}

{% block content %}

<div class="container mt-4" style="max-width: 500px;">

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">

            <!-- Header -->
            <div class="d-flex align-items-center gap-3 mb-4">
                <div style="
                    width: 52px; height: 52px; border-radius: 50%;
                    background: linear-gradient(135deg, #6366f1, #8b5cf6);
                    display: flex; align-items: center; justify-content: center;
                    font-size: 18px; font-weight: 700; color: white; flex-shrink: 0;
                ">
                    {{ request.user.username|slice:":2"|upper }}
                </div>
                <div>
                    <h5 class="mb-0 fw-bold">Edit Profile</h5>
                    <div class="text-muted small">@{{ request.user.username }}</div>
                </div>
            </div>

            <hr>

            <form method="POST">
                {% csrf_token %}

                <!-- First Name -->
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted text-uppercase" 
                           style="letter-spacing:.6px;">First Name</label>
                    <input 
                        type="text" 
                        name="first_name"
                        class="form-control rounded-3"
                        value="{{ request.user.first_name }}"
                        placeholder="Enter first name"
                    >
                </div>

                <!-- Last Name -->
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted text-uppercase"
                           style="letter-spacing:.6px;">Last Name</label>
                    <input 
                        type="text" 
                        name="last_name"
                        class="form-control rounded-3"
                        value="{{ request.user.last_name }}"
                        placeholder="Enter last name"
                    >
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted text-uppercase"
                           style="letter-spacing:.6px;">Email</label>
                    <input 
                        type="email" 
                        name="email"
                        class="form-control rounded-3"
                        value="{{ request.user.email }}"
                        placeholder="Enter email"
                    >
                </div>

                <!-- Role -->
                <div class="mb-4">
                     <label class="form-label fw-semibold small text-muted text-uppercase"
                      style="letter-spacing:.6px;">Role</label>

                    <select name="role" class="form-select rounded-3">
                    {% for value, label in form.fields.role.choices %}
                   <option value="{{ value }}"
                      {% if form.instance.role == value %}selected{% endif %}>
                        {{ label }}
                     </option>
                 {% endfor %}
                 </select>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark px-4 rounded-3">
                        <i class="bi bi-check-lg"></i> Save Changes
                    </button>
                    <a href="{% url 'profile' request.user.username %}" 
                       class="btn btn-outline-secondary px-4 rounded-3">
                        Cancel
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
