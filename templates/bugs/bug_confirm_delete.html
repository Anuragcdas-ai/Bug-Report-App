{% extends "base.html" %}
{% block content %}
<h2>Delete Bug </h2>
<p>Are you sure you want to delete this bug ?</p>
<div style="margin: 10px 0;">
    <strong>Title:</strong>{{object.title}} <br>
    <strong>Status:</strong>{{object.status}}<br>
    <strong>Description</strong>{{object.description}}

</div>
<form method="POST">

    {% csrf_token %}
    <button type="submit" style="background-color: red; color: white;">Yes,Delete</button>
    <a href="{% url 'bug-list' %}">Cancel</a>

</form>
{% endblock %}
